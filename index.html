<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undersea Caribbean</title>
    <!-- MapLibre GL JS -->
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        .camera-info {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 15, 30, 0.75);
            color: #e0e5ff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 320px;
        }

        .camera-info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .camera-info .info-row {
            display: flex;
            flex-direction: column;
        }

        .camera-info span:first-child {
            color: #8bc6ec;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .camera-info span:last-child {
            font-variant-numeric: tabular-nums;
        }

        .copy-container {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .copy-input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a0aabf;
            border-radius: 4px;
            padding: 4px 8px;
            font-family: monospace;
            font-size: 11px;
            outline: none;
        }

        .copy-btn {
            background: #4da8da;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #8bc6ec;
        }
    </style>
    <!-- Modern font for premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div id="map"></div>

    <!--
    <div class="camera-info" id="camera-info">
        <div class="camera-info-grid">
            <div class="info-row" style="grid-column: span 2;"><span>Center</span><span id="c-center">0, 0</span></div>
            <div class="info-row"><span>Zoom</span><span id="c-zoom">0.00</span></div>
            <div class="info-row"><span>Pitch</span><span id="c-pitch">0.0°</span></div>
            <div class="info-row"><span>Bearing</span><span id="c-bearing">0.0°</span></div>
        </div>
        <div class="copy-container">
            <input type="text" class="copy-input" id="c-copy-text" readonly />
            <button class="copy-btn" onclick="copyCameraState()">Copy</button>
        </div>
    </div>
    -->

    <!-- LERC Decoder -->
    <script src="https://cdn.jsdelivr.net/npm/lerc@4.1.1/LercDecode.min.js"></script>

    <!-- Three.js ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ─── LERC → Mapbox Terrain-RGB protocol ───────────────────────────────────
        maplibregl.addProtocol('gebcolerc', (params, abortController) => {
            const tileUrl = params.url.replace('gebcolerc://', 'https://');

            return fetch(tileUrl, { signal: abortController.signal })
                .then(res => {
                    if (!res.ok) throw new Error(res.statusText);
                    return res.arrayBuffer();
                })
                .then(async buffer => {
                    if (!Lerc.isLoaded()) {
                        await Lerc.load({ locateFile: () => 'https://cdn.jsdelivr.net/npm/lerc@4.1.1/lerc-wasm.wasm' });
                    }
                    const decoded = Lerc.decode(buffer);
                    const width = decoded.width;
                    const height = decoded.height;
                    const pixels = decoded.pixels[0];

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    const imgData = ctx.createImageData(width, height);

                    const noDataValue = decoded.statistics && decoded.statistics[0] ? decoded.statistics[0].noDataValue : NaN;

                    for (let i = 0; i < pixels.length; i++) {
                        let elevation = pixels[i];
                        if (elevation === noDataValue || isNaN(elevation)) {
                            elevation = 0;
                        }

                        // Mapbox Terrain RGB encoding
                        let h = Math.round((elevation + 10000) * 10);
                        if (h < 0) h = 0;
                        if (h > 16777215) h = 16777215;

                        const idx = i * 4;
                        imgData.data[idx] = (h >> 16) & 0xFF; // R
                        imgData.data[idx + 1] = (h >> 8) & 0xFF; // G
                        imgData.data[idx + 2] = h & 0xFF; // B
                        imgData.data[idx + 3] = 255;               // A
                    }

                    ctx.putImageData(imgData, 0, 0);

                    return new Promise(resolve => {
                        createImageBitmap(canvas).then(imageBitmap => {
                            resolve({ data: imageBitmap });
                        });
                    });
                });
        });

        // ─── Map initialisation ───────────────────────────────────────────────────
        const map = new maplibregl.Map({
            container: 'map',
            style: 'style.json',
            center: [-60.7880, 14.1050],
            zoom: 9.91,
            minZoom: 3.5,
            pitch: 76.5,
            bearing: -20.7,
            maxPitch: 85,
            renderWorldCopies: false,
            // Enable antialiasing so the shared WebGL context works well with Three.js
            canvasContextAttributes: { antialias: true }
        });

        map.addControl(
            new maplibregl.NavigationControl({
                visualizePitch: true,
                showZoom: true,
                showCompass: true
            }),
            'top-right'
        );

        // ─── Three.js Animated Sea-Level Plane ────────────────────────────────────
        //
        // Design notes
        // ============
        // 1. COORDINATE SYSTEM
        //    MapLibre's custom-layer matrix (args.defaultProjectionData.mainMatrix)
        //    transforms Mercator coordinates [0..1, 0..1, z] into clip space.
        //    We build a local scene whose origin sits at a chosen lng/lat at
        //    altitude 0 m (true sea level).  Every frame we recompute the
        //    MercatorCoordinate for that origin so it tracks the exaggerated
        //    terrain correctly.
        //
        // 2. TERRAIN EXAGGERATION
        //    style.json sets exaggeration: 1.5.  MapLibre scales the terrain mesh
        //    vertically by that factor, but MercatorCoordinate.fromLngLat(lngLat, 0)
        //    already returns the *exaggerated* Z for altitude 0 when called each
        //    frame (the internal transform bakes exaggeration in).  So passing
        //    altitude = 0 each frame gives us true sea level automatically.
        //
        // 3. PLANE GEOMETRY
        //    A large PlaneGeometry (in metres) centred at the scene origin.
        //    The scene is rotated so Three.js Y-up maps to MapLibre Z-up, and
        //    Z is mirrored so it points north (matching MapLibre's convention).
        //
        // 4. DEPTH WRITE
        //    depthWrite: false prevents the translucent water surface from
        //    occluding the terrain fragments behind it in the depth buffer.
        //    depthTest: true is kept so the plane is correctly hidden by land
        //    that rises above sea level.
        //
        // 5. SHIMMER ANIMATION
        //    Two sine waves at human-visible spatial frequencies (30–60 cycles
        //    across the plane) produce gentle, realistic ripples.

        // A stable geographic origin for the Three.js scene (centre of the view).
        const SCENE_ORIGIN = new maplibregl.LngLat(-60.7880, 14.1050);

        // Half-width of the sea plane in metres — large enough to fill the view.
        const SEA_PLANE_HALF_SIZE = 600000; // 600 km each side

        const waterLayer = {
            id: 'sea-level-plane',
            type: 'custom',
            renderingMode: '3d',

            onAdd(map, gl) {
                this.camera = new THREE.Camera();
                this.scene = new THREE.Scene();

                // Rotate scene so Three.js Y-up → MapLibre Z-up,
                // and mirror Z so it points north (MapLibre convention).
                this.scene.rotateX(Math.PI / 2);
                this.scene.scale.multiply(new THREE.Vector3(1, 1, -1));

                // Sea plane in metres, centred at scene origin (0, 0, 0).
                // The plane lies in the XZ plane of Three.js (= horizontal in MapLibre).
                const size = SEA_PLANE_HALF_SIZE * 2;
                const geo = new THREE.PlaneGeometry(size, size, 4, 4);

                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0.0 },
                        color: { value: new THREE.Color('#1a7fbf') }
                    },
                    vertexShader: `
                        varying vec2 vPos;
                        void main() {
                            vPos = position.xy;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3  color;
                        uniform float time;
                        varying vec2  vPos;

                        // Simple pseudo-random hash for noise
                        float hash(vec2 p) {
                            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                        }

                        // Smooth bilinear noise in [0,1]
                        float noise(vec2 p) {
                            vec2 i = floor(p);
                            vec2 f = fract(p);
                            vec2 u = f * f * (3.0 - 2.0 * f); // smoothstep
                            return mix(
                                mix(hash(i),             hash(i + vec2(1,0)), u.x),
                                mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x),
                                u.y
                            );
                        }

                        void main() {
                            // Scale metres → a comfortable UV space
                            // 1 unit ≈ 50 km so the plane (600 km half-size) spans ~24 units
                            float scale = 1.0 / 50000.0;
                            vec2 uv = vPos * scale;

                            // Layer 1: large slow swell (low frequency)
                            float swell = sin(uv.x * 1.2 + time * 0.4)
                                        * cos(uv.y * 0.9 - time * 0.3);

                            // Layer 2: medium cross-chop
                            float chop  = sin((uv.x + uv.y) * 2.8 + time * 0.9)
                                        * sin((uv.x - uv.y) * 2.2 - time * 0.7);

                            // Layer 3: fine surface sparkle from noise
                            vec2 sparkleUV = uv * 6.0 + vec2(time * 0.25, time * 0.18);
                            float sparkle = noise(sparkleUV) * 2.0 - 1.0; // [-1,1]

                            // Combine: swell dominates, chop adds texture, sparkle adds life
                            float wave = swell * 0.50
                                       + chop  * 0.30
                                       + sparkle * 0.20;

                            // Base alpha 0.42, wave ±0.10 → range [0.32, 0.52]
                            float alpha = 0.42 + wave * 0.10;

                            // Slight colour shift: crests are lighter/more cyan, troughs darker
                            vec3 crest  = color * 1.18 + vec3(0.04, 0.06, 0.05);
                            vec3 trough = color * 0.82;
                            vec3 c = mix(trough, crest, wave * 0.5 + 0.5);

                            gl_FragColor = vec4(c, alpha);
                        }
                    `,
                    transparent: true,
                    depthWrite: false,   // FIX: don't occlude terrain behind the plane
                    depthTest: true,    // still hidden by land above sea level
                    side: THREE.DoubleSide
                });

                this.mesh = new THREE.Mesh(geo, this.material);
                // PlaneGeometry lies in XY by default; rotate it flat (XZ).
                this.mesh.rotation.x = -Math.PI / 2;
                this.scene.add(this.mesh);

                this.renderer = new THREE.WebGLRenderer({
                    canvas: map.getCanvas(),
                    context: gl,
                    antialias: true
                });
                this.renderer.autoClear = false;
            },

            render(gl, args) {
                // Advance animation clock
                this.material.uniforms.time.value += 0.018;

                // ── Build the scene-origin transform ──────────────────────────────
                // Pass altitude = 0 so we sit at true sea level.
                // MapLibre bakes terrain exaggeration into the Mercator Z, so this
                // automatically compensates for the exaggeration: 1.5 setting.
                const originMercator = maplibregl.MercatorCoordinate.fromLngLat(
                    SCENE_ORIGIN, 0
                );

                const scale = originMercator.meterInMercatorCoordinateUnits();

                // The local-to-world matrix: translate to origin, then scale metres → Mercator.
                // Y scale is negated to match MapLibre's inverted Y axis.
                const l = new THREE.Matrix4()
                    .makeTranslation(originMercator.x, originMercator.y, originMercator.z)
                    .scale(new THREE.Vector3(scale, -scale, scale));

                // Combine with MapLibre's projection matrix
                const m = new THREE.Matrix4().fromArray(args.defaultProjectionData.mainMatrix);
                this.camera.projectionMatrix = m.multiply(l);

                // FIX: use resetState() (public API) instead of state.reset() (internal)
                this.renderer.resetState();
                this.renderer.render(this.scene, this.camera);
                map.triggerRepaint();
            }
        };

        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ─── Mermaid 3D Model Layer ──────────────────────────────────────────
        //
        // This version uses a high-quality 3D GLB model (mermaid.glb).
        // It plays the model's internal swimming animation and uses a silhouette shader.

        const mermaidLayer = {
            id: 'mermaid-animation',
            type: 'custom',
            renderingMode: '3d',

            onAdd(map, gl) {
                this.camera = new THREE.Camera();
                this.scene = new THREE.Scene();

                // 1. Loader
                const loader = new GLTFLoader();

                // 2. Silhouette Material
                // A deep oceanic teal silhouette with slight transparency
                const silhouetteMaterial = new THREE.MeshBasicMaterial({
                    color: 0x004455,
                    transparent: true,
                    opacity: 0.9
                });

                loader.load('mermaid.glb', (gltf) => {
                    this.model = gltf.scene;
                    this.model.traverse((child) => {
                        if (child.isMesh) {
                            child.material = silhouetteMaterial;
                        }
                    });
                    // Scale set to 800 to be visible on the geographic map
                    this.model.scale.set(800, 800, 800);
                    this.scene.add(this.model);
                    if (gltf.animations && gltf.animations.length > 0) {
                        this.mixer = new THREE.AnimationMixer(this.model);
                        gltf.animations.forEach(clip => {
                            this.mixer.clipAction(clip).play();
                        });
                    }
                });

                this.renderer = new THREE.WebGLRenderer({
                    canvas: map.getCanvas(),
                    context: gl,
                    antialias: true
                });
                this.renderer.autoClear = false;
                this.clock = new THREE.Clock();
            },

            render(gl, args) {
                const t = this.clock.getElapsedTime();
                const delta = this.clock.getDelta();

                // Update animation if ready
                if (this.mixer) this.mixer.update(delta);

                if (this.model) {
                    // Circular path
                    const radius = 10000; // 10km path
                    const lng = SCENE_ORIGIN.lng + Math.sin(t * 0.08) * 0.1;
                    const lat = SCENE_ORIGIN.lat + Math.cos(t * 0.08) * 0.1;

                    // Terrain Awareness
                    const terrainHeight = map.queryTerrainElevation([lng, lat]) || 0;
                    // Swim at constant depth near surface for debugging/initial visibility
                    const targetDepth = -80;

                    const pos = maplibregl.MercatorCoordinate.fromLngLat([lng, lat], 0);
                    const origin = maplibregl.MercatorCoordinate.fromLngLat(SCENE_ORIGIN, 0);
                    const scale = origin.meterInMercatorCoordinateUnits();

                    this.model.position.x = (pos.x - origin.x) / scale;
                    this.model.position.z = (pos.y - origin.y) / -scale;
                    this.model.position.y = targetDepth + Math.sin(t * 0.4) * 40; // Gentle depth wobble

                    // Orientation: face direction of travel
                    this.model.rotation.y = t * 0.08 + Math.PI;
                    // Slight tilt as she swims
                    this.model.rotation.z = Math.sin(t * 0.4) * 0.2;
                }

                // Update Camera
                const origin = maplibregl.MercatorCoordinate.fromLngLat(SCENE_ORIGIN, 0);
                const scale = origin.meterInMercatorCoordinateUnits();
                const l = new THREE.Matrix4()
                    .makeTranslation(origin.x, origin.y, origin.z)
                    .scale(new THREE.Vector3(scale, -scale, scale));
                const m = new THREE.Matrix4().fromArray(args.defaultProjectionData.mainMatrix);
                this.camera.projectionMatrix = m.multiply(l);

                this.renderer.resetState();
                this.renderer.render(this.scene, this.camera);
                map.triggerRepaint();
            }
        };

        map.on('style.load', () => {
            // Insert the water layer specifically BEFORE our geojson marker layers
            // so the labels and glows render distinctly ON TOP of the blue water.
            map.addLayer(waterLayer, 'places-glow');

            // Add the mermaid layer on top of the water so she is visible
            map.addLayer(mermaidLayer);
        });

        // ─── Camera info overlay ──────────────────────────────────────────────────
        function updateCameraInfo() {
            const center = map.getCenter();
            const lng = center.lng.toFixed(4);
            const lat = center.lat.toFixed(4);
            const zoom = map.getZoom().toFixed(2);
            const pitch = map.getPitch().toFixed(1);
            const bearing = map.getBearing().toFixed(1);

            document.getElementById('c-center').innerText = `${lng}, ${lat}`;
            document.getElementById('c-zoom').innerText = zoom;
            document.getElementById('c-pitch').innerText = pitch + '°';
            document.getElementById('c-bearing').innerText = bearing + '°';

            const copyStr = `center: [${lng}, ${lat}], zoom: ${zoom}, pitch: ${pitch}, bearing: ${bearing}`;
            document.getElementById('c-copy-text').value = copyStr;
        }

        window.copyCameraState = function () {
            const input = document.getElementById('c-copy-text');
            input.select();
            document.execCommand('copy');
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Copied!';
            setTimeout(() => { btn.innerText = 'Copy'; }, 2000);
        };

        //map.on('move', updateCameraInfo);
        //map.on('load', updateCameraInfo);
    </script>
</body>

</html>
